name: Build & Deploy CV

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for peaceiris/actions-gh-pages to push to gh-pages branch
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'   # opt into Node 24 ahead of forced migration

    steps:
      # ── 1. Check out the repo ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Quarto (+ TinyTeX, used only by the best-effort PDF steps below) ──
      - name: Cache TinyTeX
        id: cache-tinytex
        uses: actions/cache@v4
        with:
          path: ~/.TinyTeX
          # v2: force a fresh TinyTeX after the TeX Live year rollover.
          key: tinytex-${{ runner.os }}-v2

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # ── 3. Render the Markdown CV — REQUIRED, pure pandoc + citeproc, NO LaTeX.
      # This is the primary deliverable (ehrlinger.github.io/CV/JohnEhrlinger-CV.md).
      # It is deliberately decoupled from the fragile LaTeX toolchain below so a
      # TeX failure can never block the Markdown deploy. If this step fails, the
      # whole job fails (that is intended — the .md is the point). ──────────────
      - name: Render CV (Markdown)
        run: quarto render JohnEhrlinger-CV.qmd --to gfm

      # ══ Everything below is BEST-EFFORT: the PDF and NIH biosketch build when
      #    the LaTeX toolchain cooperates, but never block the Markdown deploy. ══

      # ── 4. Extra LaTeX packages for the PDF + biosketch (cache miss only) ────
      - name: Install extra LaTeX packages (best-effort)
        if: steps.cache-tinytex.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          export PATH="$HOME/.TinyTeX/bin/x86_64-linux:$PATH"
          # tlnet serves only the current TeX Live year; after a rollover the
          # bundled tlmgr can't install ("tlmgr itself needs to be updated" /
          # "could not get texlive.tlpdb"). Pin to TUG's authoritative mirror
          # (NOT the mirror.ctan.org redirector, which round-robins to
          # sometimes-stale mirrors) and update tlmgr before installing.
          tlmgr option repository https://ftp.tug.org/texlive/tlnet
          tlmgr update --self
          # ebgaramond(-maths): quarto-cv loads ebgaramond-maths, which needs the
          # base ebgaramond for ebgaramond.sty (quarto's auto-install misses it).
          # tex-gyre: Arial replacement for the biosketch (see step 6).
          tlmgr install \
            xetex \
            collection-fontsrecommended \
            collection-latexrecommended \
            lm-math \
            ebgaramond \
            ebgaramond-maths \
            tex-gyre

      - name: Add TinyTeX to PATH
        run: echo "$HOME/.TinyTeX/bin/x86_64-linux" >> $GITHUB_PATH

      # ── 5. Render the PDF CV (lualatex) ──────────────────────────────────────
      - name: Render CV (PDF, best-effort)
        continue-on-error: true
        run: quarto render JohnEhrlinger-CV.qmd --to quarto-cv-pdf

      # ── 6. NIH Biosketch (XeLaTeX) ───────────────────────────────────────────
      # nihbiosketch.cls does \setmainfont{Arial}; Arial is proprietary/absent on
      # Ubuntu, so patch it to TeX Gyre Heros loaded BY FILENAME (XeTeX by-name
      # lookup uses fontconfig, which doesn't index TinyTeX fonts; filename
      # loading uses kpathsea/texmf and always resolves).
      - name: Compile NIH Biosketch (best-effort)
        continue-on-error: true
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/pmagwene/latex-nihbiosketch/master/nihbiosketch.cls \
            -o nihbiosketch.cls
          sed -i 's|\\setmainfont\[Ligatures=TeX\]{Arial}|\\setmainfont{texgyreheros}[Extension=.otf,UprightFont=*-regular,BoldFont=*-bold,ItalicFont=*-italic,BoldItalicFont=*-bolditalic,Ligatures=TeX]|' nihbiosketch.cls
          grep setmainfont nihbiosketch.cls
          xelatex -interaction=nonstopmode JohnEhrlinger-Biosketch-NIH.tex
          xelatex -interaction=nonstopmode JohnEhrlinger-Biosketch-NIH.tex

      # ── 7. Report which artifacts built (loud, but non-blocking) ─────────────
      - name: Report build status
        if: always()
        run: |
          echo "### CV build status" >> "$GITHUB_STEP_SUMMARY"
          for f in JohnEhrlinger-CV.md JohnEhrlinger-CV.pdf JohnEhrlinger-Biosketch-NIH.pdf; do
            if [ -s "$f" ]; then
              echo "- ✅ $f ($(wc -c < "$f") bytes)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ⚠️ $f MISSING — last-good copy retained on gh-pages" >> "$GITHUB_STEP_SUMMARY"
              echo "::warning::$f was not produced this run (best-effort LaTeX build)"
            fi
          done
          # Fail loud if the REQUIRED Markdown is missing.
          test -s JohnEhrlinger-CV.md || { echo "::error::JohnEhrlinger-CV.md was not produced"; exit 1; }

      # ── 8. Upload artifacts (whatever built) ─────────────────────────────────
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cv-outputs
          if-no-files-found: warn
          path: |
            JohnEhrlinger-CV.md
            JohnEhrlinger-CV.pdf
            JohnEhrlinger-Biosketch-NIH.pdf

      # ── 9. Deploy to gh-pages ────────────────────────────────────────────────
      # keep_files: true so a best-effort LaTeX miss (no new PDF this run) keeps
      # the last-good PDF/biosketch on gh-pages instead of deleting them.
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
          exclude_assets: |
            .github
            archive
            *.tex
            *.bib
            *.cls
            *.log
            *.aux
            *.bbl
            *.bcf
            *.blg
            *.run.xml
            *.fdb_latexmk
            *.fls
            *.xdv
            *.out
            .gitignore
