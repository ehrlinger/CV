name: Build CV PDFs

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for peaceiris/actions-gh-pages to push to gh-pages branch
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'   # opt into Node 24 ahead of June 2026 forced migration

    steps:
      # ── 1. Check out the repo ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install Quarto with TinyTeX (auto-installs missing LaTeX packages) ─
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # ── 3. Install extra packages needed by biosketch (xelatex) ─────────────
      - name: Install extra LaTeX packages
        run: |
          tlmgr install \
            xetex \
            collection-fontsrecommended \
            collection-latexrecommended \
            lm-math

      # ── 4. Download nihbiosketch.cls (not committed to repo) ─────────────────
      - name: Download nihbiosketch.cls
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/pmagwene/latex-nihbiosketch/master/nihbiosketch.cls \
            -o nihbiosketch.cls

      # ── 5. Render CV via Quarto (lualatex, via mps9506/quarto-cv extension) ──
      - name: Render CV
        run: quarto render JohnEhrlinger-CV.qmd

      # ── 6. Compile NIH Biosketch (XeLaTeX) ──────────────────────────────────
      # continue-on-error: the PDF IS produced but xelatex exits code 1 for
      # ~38 nullfont warnings in a table; the verify step confirms it exists.
      - name: Compile NIH Biosketch
        continue-on-error: true
        run: |
          xelatex -interaction=nonstopmode JohnEhrlinger-Biosketch-NIH.tex
          xelatex -interaction=nonstopmode JohnEhrlinger-Biosketch-NIH.tex

      - name: Verify biosketch PDF was produced
        run: |
          if [ ! -s JohnEhrlinger-Biosketch-NIH.pdf ]; then
            echo "ERROR: biosketch PDF is missing or empty — compilation truly failed"
            exit 1
          fi
          echo "OK: biosketch PDF exists ($(wc -c < JohnEhrlinger-Biosketch-NIH.pdf) bytes)"

      # ── 7. Upload PDFs as build artifacts ────────────────────────────────────
      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: |
            JohnEhrlinger-CV.pdf
            JohnEhrlinger-Biosketch-NIH.pdf

      # ── 8. Deploy to gh-pages branch ─────────────────────────────────────────
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
          exclude_assets: |
            .github
            archive
            *.tex
            *.bib
            *.cls
            *.log
            *.aux
            *.bbl
            *.bcf
            *.blg
            *.run.xml
            *.fdb_latexmk
            *.fls
            *.xdv
            *.out
            .gitignore
