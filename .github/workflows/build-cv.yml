name: Build CV PDFs

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for peaceiris/actions-gh-pages to push to gh-pages branch
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'   # opt into Node 24 ahead of June 2026 forced migration

    steps:
      # ── 1. Check out the repo ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Download nihbiosketch.cls (not committed to repo) ─────────────────
      - name: Download nihbiosketch.cls
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/pmagwene/latex-nihbiosketch/master/nihbiosketch.cls \
            -o nihbiosketch.cls

      # ── 3. Compile CV (pdflatex + biber) ─────────────────────────────────────
      - name: Compile CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: JohnEhrlinger-CV.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          extra_system_packages: "biber"
          args: "-pdf -interaction=nonstopmode -file-line-error"
          post_compile: |
            biber JohnEhrlinger-CV
            pdflatex JohnEhrlinger-CV.tex
            pdflatex JohnEhrlinger-CV.tex

      # ── 4. Compile NIH Biosketch (XeLaTeX) ──────────────────────────────────
      # nihbiosketch.cls requires Arial; the .tex file falls back to TeX Gyre
      # Heros (Arial-compatible, included in TeX Live Full) when Arial is absent.
      # continue-on-error: the PDF IS produced (xdvipdfmx runs successfully) but
      # xelatex exits code 1 for ~38 nullfont warnings in a table; latexmk then
      # exits code 12.  The verify step below confirms the PDF actually exists.
      - name: Compile NIH Biosketch
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          root_file: JohnEhrlinger-Biosketch-NIH.tex
          latexmk_use_xelatex: true
          args: "-f -xelatex -interaction=nonstopmode -file-line-error"

      - name: Verify biosketch PDF was produced
        run: |
          if [ ! -s JohnEhrlinger-Biosketch-NIH.pdf ]; then
            echo "ERROR: biosketch PDF is missing or empty — compilation truly failed"
            exit 1
          fi
          echo "OK: biosketch PDF exists ($(wc -c < JohnEhrlinger-Biosketch-NIH.pdf) bytes)"

      # ── 5. Upload PDFs as build artifacts ────────────────────────────────────
      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: |
            JohnEhrlinger-CV.pdf
            JohnEhrlinger-Biosketch-NIH.pdf

      # ── 6. Deploy to gh-pages branch (serves as ehrlinger.github.io source) ──
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .          # copies everything to gh-pages
          publish_branch: gh-pages
          keep_files: false
          exclude_assets: |
            .github
            *.tex
            *.bib
            *.cls
            *.log
            *.aux
            *.bbl
            *.bcf
            *.blg
            *.run.xml
            *.fdb_latexmk
            *.fls
            *.xdv
            *.out
            .gitignore
