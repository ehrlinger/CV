name: Build CV PDFs

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for peaceiris/actions-gh-pages to push to gh-pages branch
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'   # opt into Node 24 ahead of June 2026 forced migration

    steps:
      # ── 1. Check out the repo ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Restore TinyTeX cache (skips slow package installs on repeat runs) ─
      - name: Cache TinyTeX
        id: cache-tinytex
        uses: actions/cache@v4
        with:
          path: ~/.TinyTeX
          key: tinytex-${{ runner.os }}-v1
          restore-keys: tinytex-${{ runner.os }}-

      # ── 3. Install Quarto with TinyTeX ───────────────────────────────────────
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # ── 4. Install extra packages (xetex for biosketch) — cache miss only ────
      - name: Install extra LaTeX packages
        if: steps.cache-tinytex.outputs.cache-hit != 'true'
        run: |
          export PATH="$HOME/.TinyTeX/bin/x86_64-linux:$PATH"
          tlmgr install \
            xetex \
            collection-fontsrecommended \
            collection-latexrecommended \
            lm-math

      # ── 5. Ensure TinyTeX bin is on PATH for all subsequent steps ────────────
      - name: Add TinyTeX to PATH
        run: echo "$HOME/.TinyTeX/bin/x86_64-linux" >> $GITHUB_PATH

      # ── 6. Download nihbiosketch.cls (not committed to repo) ─────────────────
      - name: Download nihbiosketch.cls
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/pmagwene/latex-nihbiosketch/master/nihbiosketch.cls \
            -o nihbiosketch.cls

      # ── 7. Render CV — PDF (lualatex) and GFM Markdown both in one pass ──────
      - name: Render CV
        run: quarto render JohnEhrlinger-CV.qmd

      # ── 8. Compile NIH Biosketch (XeLaTeX) ──────────────────────────────────
      # continue-on-error: the PDF IS produced but xelatex exits code 1 for
      # ~38 nullfont warnings in a table; the verify step confirms it exists.
      - name: Compile NIH Biosketch
        continue-on-error: true
        run: |
          xelatex -interaction=nonstopmode JohnEhrlinger-Biosketch-NIH.tex
          xelatex -interaction=nonstopmode JohnEhrlinger-Biosketch-NIH.tex

      - name: Verify biosketch PDF was produced
        run: |
          if [ ! -s JohnEhrlinger-Biosketch-NIH.pdf ]; then
            echo "ERROR: biosketch PDF is missing or empty — compilation truly failed"
            exit 1
          fi
          echo "OK: biosketch PDF exists ($(wc -c < JohnEhrlinger-Biosketch-NIH.pdf) bytes)"

      # ── 9. Upload PDFs as build artifacts ────────────────────────────────────
      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: |
            JohnEhrlinger-CV.pdf
            JohnEhrlinger-CV.md
            JohnEhrlinger-Biosketch-NIH.pdf

      # ── 10. Deploy to gh-pages branch ────────────────────────────────────────
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
          exclude_assets: |
            .github
            archive
            *.tex
            *.bib
            *.cls
            *.log
            *.aux
            *.bbl
            *.bcf
            *.blg
            *.run.xml
            *.fdb_latexmk
            *.fls
            *.xdv
            *.out
            .gitignore
